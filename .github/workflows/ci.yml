name: deterministic-quality-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
      - name: Install PostgreSQL tools
        run: sudo apt-get update && sudo apt-get install --yes postgresql
      - name: Install project dependencies
        run: uv sync --all-groups --no-install-project --locked
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Golden regression
        run: make golden
