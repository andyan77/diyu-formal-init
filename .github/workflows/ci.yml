name: deterministic-quality-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: astral-sh/setup-uv@v8
      - name: Install PostgreSQL tools
        run: sudo apt-get update && sudo apt-get install --yes postgresql
      - name: Install project dependencies
        run: uv sync --all-groups --no-install-project --locked
      - name: Install frontend dependencies
        run: npm --prefix frontend install
      - name: Frontend lint and build
        run: make frontend-lint frontend-typecheck frontend-build
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Golden regression
        run: make golden
