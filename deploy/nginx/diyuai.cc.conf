server {
    listen 80;
    listen [::]:80;
    server_name diyuai.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name diyuai.cc;

    # The existing certificate currently covers both diyuai.cc and kb.diyuai.cc.
    ssl_certificate /etc/letsencrypt/live/kb.diyuai.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.diyuai.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 55m;
    proxy_connect_timeout 10s;
    proxy_read_timeout 130s;
    proxy_send_timeout 130s;

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
