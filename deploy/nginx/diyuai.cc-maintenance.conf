server {
    listen 80;
    listen [::]:80;
    server_name diyuai.cc;
    return 503;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name diyuai.cc;

    ssl_certificate /etc/letsencrypt/live/kb.diyuai.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.diyuai.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 503;
}
