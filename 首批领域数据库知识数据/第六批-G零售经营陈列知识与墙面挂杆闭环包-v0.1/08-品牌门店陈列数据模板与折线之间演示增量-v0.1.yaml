demo_increment:
  brand:
    brand_ref: demo_brand_fold_between
    display_policy_ref: fold_between_display_policy_v1
    policy_version: '1.0'
    default_task_goal: visual_merchandising
    visual_hierarchy:
      primary_focus_policy: one_clear_primary_focus_with_weaker_response
      secondary_response_policy: response_must_not_equal_primary_strength
    color_texture_direction: low_saturation_palette; use value contrast, unique texture, position and whitespace rather than
      fabricating bright products
    density_preference: do_not_fill_to_capacity; preserve focus and product accessibility
    grouping_direction: organize readable outfit zones rather than pure category blocks
    prohibited_patterns:
    - invent_bright_product_for_focus
    - make_every_zone_primary
    - treat_inventory_list_as_fill_command
    confirmation:
      basis: D-005 golden closure supplied by user
      confirmed_at: '2026-07-22'
  store_wall_rail_profile:
    store_ref: fold_between_nancheng_store
    display_zone_ref: nancheng_salesfloor_wall_01
    display_carrier_ref: nancheng_wall_rail_group_01
    profile_version: '1.0'
    structure:
      upper_rail: true
      lower_rail: true
      fixed_front_facing_points: 2
    capacity_rules:
      upper_side_hang_max: 6
      lower_hang_max: 8
      notes: fixed front-facing points occupy additional visual/physical space; capacity is a ceiling, not a fill target
    primary_approach_direction: left
    main_sight_band_cm:
    - 120
    - 160
    hard_constraints:
    - upper and lower outfit zones should remain vertically readable
    - primary focus uses left entry-side fixed front-facing point unless conditions change
    - products must remain easy to extract
    - fixture condition changes must be reported before reuse
    last_confirmed_at: '2026-07-22'
