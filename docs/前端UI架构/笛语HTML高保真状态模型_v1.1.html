<script>
(()=>{
const q=(s,r=document)=>r.querySelector(s),qa=(s,r=document)=>[...r.querySelectorAll(s)];
const I=n=>`<svg class="icon"><use href="#i-${n}"/></svg>`;
const states=[['landing','01 首次入口'],['home','02 返回首页'],['content-empty','03 内容空状态'],['content-discuss','04 最小追问'],['content-artifact','05 完整成品'],['content-revision','06 只改一处'],['series','07 系列与计划'],['display-input','08 库存输入'],['display-artifact','09 挂杆方案'],['display-revision','10 小改一版'],['admin','11 入驻就绪'],['materials','12 素材边界'],['system','13 搜索与状态'],['empty-pattern','14 空状态'],['fail-pattern','15 失败与重试'],['confirm-pattern','16 删除确认']];
let current='landing',mobile=false,notes=false,menu=false,timer;
q('#stateNav').innerHTML=states.map(([id,l])=>`<button data-state="${id}">${l}</button>`).join('');
function identity(app){return app==='display'?['折线之间 · 南城店','表达身份：店长 · 挂杆情况已按本店设好']:app==='admin'?['折线之间 · 企业管理','实际登录：林岚 · 权限按职责显示']:['折线之间 · 南城店账号','表达身份：店长 / 门店经营者 · 南城店']}
function header(app){const label=app==='display'?'陈列搭配':app==='admin'?'企业管理':'内容生产',id=identity(app);return `<header class="topbar"><div class="logo"><svg class="vi-mark"><use href="#i-vi"/></svg><strong>笛语</strong></div><button class="app-switch" data-action="menu" data-note="顶层业务域明确；任务形成后应用与身份固定。"><i class="dot"></i>${label}${I('down')}</button><div class="identity" data-action="identity" data-note="业务身份只读；权限与作用域由服务端校验。"><div class="ico">${I(app==='display'?'rail':app==='admin'?'building':'users')}</div><div><div class="identity-main">${app==='admin'?'正在代表':'发布账号'}：${id[0]}</div><div class="identity-sub">${id[1]}</div></div></div><div class="top-actions"><button class="icon-btn" data-action="search">${I('search')}</button><button class="icon-btn" data-action="help">${I('help')}</button><div class="avatar">岚</div></div><div class="app-menu ${menu?'open':''}"><div class="app-option ${app==='content'?'active':''}" data-go="content-empty"><div class="ico">${I('edit')}</div><div><b>内容生产</b><p>形成可拍摄、制作或排版的品牌内容</p></div></div><div class="app-option ${app==='display'?'active':''}" data-go="display-input"><div class="ico">${I('rail')}</div><div><b>陈列搭配</b><p>形成双层挂杆文字执行方案</p></div></div><div class="app-option ${app==='admin'?'active':''}" data-go="admin"><div class="ico">${I('building')}</div><div><b>企业管理</b><p>只显示有权限且真实可行动的事项</p></div></div></div></header>`}
function sidebar(app,active){const sets={content:[['home','home','继续最近'],['artifacts','file','我的成品'],['series','series','连续系列'],['plans','calendar','内容计划'],['private','box','私人素材']],display:[['new','rail','新建挂杆方案'],['history','history','历史方案'],['conditions','settings','本店挂杆情况']],admin:[['readiness','home','入驻与就绪'],['brand','palette','品牌表达与账号方向'],['access','users','人员、账号与角色'],['org','box','组织素材']]};const n=sets[app];return `<aside class="sidebar"><button class="new-btn" data-go="${app==='display'?'display-input':app==='admin'?'home':'content-empty'}">${I(app==='admin'?'arrow':'plus')}${app==='display'?'新建挂杆方案':app==='admin'?'返回日常工作':'新建内容'}</button><div><div class="nav-label">${app==='admin'?'企业设置':'工作区'}</div>${n.map(([id,ico,l])=>`<div class="nav-item ${active===id?'active':''}">${I(ico)}<span>${l}</span>${id==='artifacts'?'<em class="nav-count">12</em>':''}</div>`).join('')}</div>${app==='content'?`<div><div class="nav-label">最近</div><div class="nav-item" data-go="content-revision">${I('file')}<span>三天只带一件外套</span></div><div class="nav-item" data-go="series">${I('series')}<span>门店里那些没说完的话</span></div></div>`:''}${app==='display'?`<div><div class="nav-label">最近</div><div class="nav-item" data-go="display-revision">${I('rail')}<span>南城店 · 墙面双杆</span><em class="nav-count">V2</em></div></div>`:''}<div class="spacer"></div>${app==='admin'?`<div class="sidebar-note">${I('info')}<span>管理员身份不自动取得素材维护权。</span></div>`:''}</aside>`}
function shell(app,active,body){return `<div class="app">${header(app)}<div class="app-body">${sidebar(app,active)}${body}</div></div>`}
function chips(app='content'){return `<div class="chips">${app==='display'?`<span class="chip">${I('rail')}双层挂杆</span><span class="chip">上杆主要视线带</span><span class="chip">主来客：左侧</span>`:`<span class="chip">${I('users')}南城店账号</span><span class="chip">小红书视频</span><span class="chip">独立单篇</span><span class="chip">一人一手机</span>`}</div>`}
function composer(app='content',ph='继续说你的想法…',lbl=''){return `<div class="composer-wrap">${chips(app)}<div class="composer" data-note="自然输入是主入口；上下文标签是辅助，不是必填表单。"><textarea placeholder="${ph}"></textarea><div class="composer-foot"><button class="tool" data-action="attach">${I('clip')}</button>${app==='content'?`<button class="tool">${I('image')}</button><button class="tool">${I('mic')}</button>`:''}<button class="send${lbl?' send-label':''}" data-action="send">${lbl||I('send')}</button></div></div><div class="composer-note">日常聊天不会自动成为以后创作素材；主动保存后才会复用</div></div>`}
function conversation(mode,revised=false){if(mode==='discuss')return `<section class="conversation"><div class="pane-head"><div><div class="pane-title">新内容</div><div class="pane-sub">尚未形成正式任务</div></div></div><div class="conversation-scroll"><div class="task-context"><div class="ico">${I('edit')}</div><div><b>系统建议</b><p>围绕“三位顾客进门先说我自己看看就好”做一条内容。</p></div></div><div class="msg user"><div class="bubble">可以，但别写成服务培训，也别像品牌口号。</div></div><div class="msg ai"><div class="msg-avatar">笛</div><div class="bubble">明白。我会把重点放在<strong>“想先看，不用先解释”</strong>这个公共交往边界。<br><br>有一个信息会改变成品：这次更适合视频，还是小红书图文？</div></div><div class="choice active" data-go="content-artifact"><b>小红书视频 · 一人固定机位</b><p>保持自然口语，门店现场即可完成</p></div><div class="choice" data-go="content-artifact"><b>小红书图文 · 5 张以内</b><p>用门口、衣架和空镜组织阅读链</p></div></div>${composer('content','也可以补充一句制作条件…','生成这一版')}</section>`;return `<section class="conversation mobile-hide"><div class="pane-head"><div><div class="pane-title">${revised?'南城店双层挂杆':'三天只带一件外套'}</div><div class="pane-sub">${revised?'陈列任务 · 本次库存清单':'内容任务 · 5 条消息'}</div></div></div><div class="conversation-scroll">${revised?`<div class="task-context"><div class="ico">${I('rail')}</div><div><b>固定条件已复用</b><p>双杆 · 14–16 件 · 左侧来客</p></div></div><div class="msg user"><div class="bubble">按这 20 件做一版，重点推双面短外套。</div></div><div class="msg ai"><div class="msg-avatar">笛</div><div class="bubble">已形成三个搭配组的方案，选择 15 件，不把全部库存上墙。</div></div>${current==='display-revision'?`<div class="msg user"><div class="bubble">右侧两件外套太厚，挂不下。</div></div><div class="msg ai"><div class="msg-avatar">笛</div><div class="bubble">已把右边那组（C 组）减掉一件、重新摆正，别的都没动。</div></div>`:''}`:`<div class="task-context"><div class="ico">${I('file')}</div><div><b>当前成果</b><p>小红书视频 · 独立单篇 · 一人固定机位</p></div></div><div class="msg user"><div class="bubble">三天出差只能带一件外套，这两件怎么讲，别做成参数对比。</div></div><div class="msg ai"><div class="msg-avatar">笛</div><div class="bubble">我会先守住最难补救的场景，再让重量差异成为取舍，而不是结论。</div></div><div class="msg user"><div class="bubble">结尾再克制一点，其他不动。</div></div><div class="msg ai"><div class="msg-avatar">笛</div><div class="bubble">已只改结尾，新版本在右侧。</div></div>`}</div>${composer(revised?'display':'content',revised?'反馈现场差异，例如“右侧太厚”…':'继续改，例如“只改开场，其他不动”…')}</section>`}
function artifact(rev=false){return `<section class="artifact"><div class="artifact-bar" data-note="版本自动保留；版本指定、导出、存素材、纳入系列分别表达，均不自动发生。"><div class="artifact-info"><b>三天只带一件，我先把轻的放回去</b><span>小红书视频 · 约 43 秒 · 界面演示稿</span></div><div class="versions"><button class="version ${!rev?'active':''}" data-go="content-artifact">V1${rev?' · 当前':''}</button>${rev?'<button class="version active">V2</button>':''}</div><div class="artifact-actions">${rev?`<button class="btn primary sm" data-action="current">${I('check')}设为当前版本</button><button class="btn secondary sm" data-go="content-revision">${I('edit')}继续改</button>`:`<button class="btn primary sm" data-go="content-revision">${I('edit')}继续改</button><button class="btn secondary sm" data-action="copy">复制</button>`}<button class="btn ghost sm" data-action="export">${I('download')}导出</button><div class="more-wrap"><button class="icon-btn" data-action="more">${I('more')}</button><div class="more-menu"><button data-action="copy">复制全文</button><button data-action="versions-info">查看版本</button><button data-action="save-material">存为素材</button><button data-action="end-task">结束任务</button></div></div></div></div><div class="artifact-scroll"><article class="doc">${rev?`<div class="change"><div class="ico">${I('edit')}</div><div><b>本次只改了结尾</b><p>删除通用总结，其他台词、镜头与事实保持不变。</p></div></div>`:''}<div class="doc-kicker">成品导读</div><h1>三天只带一件，我先把轻的放回去</h1><p class="lead">这一版不把重量差异直接写成优劣，而是先让观众看到：三天只带一件时，最难补救的不是多背三百多克，而是某个关键场景突然不成立。</p><section class="section"><h2>完整台词</h2><div class="script-row"><div class="time">00–05s</div><div class="script">如果三天出差只能带一件外套，我不会先拿最轻的。</div></div><div class="script-row"><div class="time">05–13s</div><div class="script">这件单层短外套，M 码样衣大约 650 克。双面这件大约 960 克，行李里确实多了约 310 克。</div></div><div class="script-row"><div class="time">13–25s</div><div class="script">但三天里只要有一天需要从早到晚、室内外来回切，我先看的不是轻不轻，是它能不能少让我临时补一件。</div></div><div class="script-row"><div class="time">25–35s</div><div class="script">所以我把轻的放回去，不是因为重的更高级。只是这一次，我更怕场景掉下来。</div></div><div class="script-row"><div class="time">35–43s</div><div class="script ${rev?'highlight':''}">${rev?'<span class="selection"><button data-action="shorter">更短</button><button data-action="spoken">更口语</button><button>自定义</button></span>':''}${rev?'三天只带一件，先守住最难补救的场景。':'轻，不是唯一答案。三天只带一件时，先看哪种代价更难补救。'}</div></div></section><section class="section"><h2>画面与动作</h2><div class="shots"><div class="shot"><small>镜头 01</small><h3>两件同时入画</h3><p>固定手机，人物站在两件外套中间，第一句话时不拿任何一件。</p></div><div class="shot"><small>镜头 02</small><h3>重量只做一次证明</h3><p>屏显 650g / 960g，不持续展示参数。</p></div><div class="shot"><small>镜头 03</small><h3>把轻的放回去</h3><p>动作自然完成判断，不额外解释。</p></div><div class="shot"><small>镜头 04</small><h3>结尾停半秒</h3><p>不走近镜头、不升华，停在选择上。</p></div></div></section><section class="section"><h2>声音与发布配文</h2><p>保留门店轻微环境声，不配情绪音乐。发布配文：三天只带一件，我先看的不是哪件更轻，而是哪一种代价更难在路上补回来。</p><div class="note">这只是演示，不会被当成正式内容或商品资料。</div></section></article></div></section>`}
function landing(){return `<div class="landing"><header class="landing-head"><div class="logo"><svg class="vi-mark"><use href="#i-vi"/></svg><strong>笛语</strong></div><div class="top-actions"><button class="icon-btn" data-action="search">${I('search')}</button><div class="avatar">岚</div></div></header><main class="landing-body"><svg class="vi-mark" style="width:48px;height:56px;position:relative"><use href="#i-vi"/></svg><h1>今天要完成什么？</h1><p class="landing-lead">选好要做哪件事，笛语就照这件事帮你。用平常说话的方式跟它讲就行。</p><div class="app-cards"><article class="app-card" data-go="content-empty" data-note="不向用户展示 P1—P5 编号，只说明业务结果。"><div class="card-ico">${I('edit')}</div><h2>内容生产</h2><p>把一个想法、商品、评论或生活观察，变成可直接拍摄、制作或排版的品牌内容。</p><div class="app-card-foot">面向品牌受众<span class="round-arrow">${I('arrow')}</span></div></article><article class="app-card display" data-go="display-input"><div class="card-ico">${I('rail')}</div><h2>陈列搭配</h2><p>用本次实际可用商品，形成可直接执行的墙面双层挂杆方案；门店反馈后只改要改的部分。</p><div class="app-card-foot">面向门店经营<span class="round-arrow">${I('arrow')}</span></div></article></div><div class="landing-foot">当前登录：林岚 · 折线之间渠道协作网络</div></main></div>`}
function home(){const body=`<main class="workspace"><div class="main"><div class="dashboard"><div class="eyebrow">内容生产 · 南城店账号</div><h1>上午好，林岚</h1><p class="page-sub">继续最近工作，或从一个已经准备好的方向开始。</p><div class="dash-grid"><section class="hero" data-note="建议未被接受前，不创建正式任务。"><small>今天可以从这件事开始</small><h2>三位顾客进门先说“我自己看看就好”。不要解释她们，先回应这句话。</h2><p>用南城店账号做一条小红书视频，让没来过门店、但经历过相似零售压力的人也得到一个清楚的交往边界。</p><div class="hero-actions"><button class="btn primary" data-go="content-discuss">开始这个</button><button class="btn secondary" data-action="suggest">换一个</button><button class="btn ghost" data-go="content-empty">我自己说</button></div></section><section class="panel"><div class="panel-head"><b>继续最近</b><span>查看全部</span></div><div class="recent" data-go="content-revision"><div class="recent-ico">${I('file')}</div><div class="recent-copy"><b>三天只带一件，我先把轻的放回去</b><p>V2 · 小红书视频 · 8 分钟前</p></div><span class="status red">当前版</span></div><div class="recent" data-go="series"><div class="recent-ico">${I('series')}</div><div class="recent-copy"><b>门店里那些没说完的话</b><p>连续系列 · 下一集待开始</p></div></div><div class="recent" data-go="display-revision"><div class="recent-ico">${I('rail')}</div><div class="recent-copy"><b>南城店双层挂杆方案</b><p>陈列搭配 · V2 · 昨天</p></div></div></section></div><div class="quick-grid"><article class="quick" data-go="content-revision"><div class="quick-top"><div class="quick-ico">${I('file')}</div><span>12 份</span></div><h3>我的成品</h3><p>从你的成品继续。</p></article><article class="quick" data-go="series"><div class="quick-top"><div class="quick-ico">${I('series')}</div><span>2 个系列</span></div><h3>连续系列</h3><p>每一集的顺序你自己排。</p></article><article class="quick" data-go="materials"><div class="quick-top"><div class="quick-ico">${I('box')}</div><span>仅本人</span></div><h3>私人素材</h3><p>只有主动保存的内容才允许跨任务复用。</p></article></div></div></div></main>`;return shell('content','home',body)}

function series(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="page-head"><div><div class="eyebrow">连续系列</div><h1 class="page-title">门店里那些没说完的话</h1><p class="page-sub">一张卡片管住定位、进度和没写完的线索，分集你自己排。</p></div><div class="page-head-actions"><button class="btn secondary">编辑系列</button><button class="btn primary" data-go="content-discuss">开始下一集</button></div></div><div class="series-grid"><section><div class="series-hero"><small>系列定位</small><h2>不替顾客解释，也不把门店写成答案</h2><p>从南城店日常发生的短句、停顿和关系压力出发，让受众多认识这个账号一点，也获得一份可以带走的交往理解。</p><div class="tags"><span>南城店账号</span><span>主题系列</span><span>小红书视频优先</span><span>不强制商品</span></div></div><div class="episodes"><div class="episode"><div class="ep-no">EP 04</div><div><b>顾客把衣服放回去时，我们先不追问</b><p>用户跳过 EP 03，直接编排第四集</p></div><span class="ep-state next">下一集</span></div><div class="episode"><div class="ep-no">EP 01</div><div><b>这周，三个人进门先说了同一句话</b><p>当前版 · 不自动写入下一集</p></div><span class="ep-state done">已完成</span></div><div class="episode"><div class="ep-no">EP 02</div><div><b>门口那份早餐，先别替它解释</b><p>由用户指定为第二集</p></div><span class="ep-state done">已完成</span></div><div class="episode"><div class="ep-no">EP 03</div><div><b>暂存：门口那把没收进去的伞</b><p>可以改序、插集或放弃</p></div><span class="ep-state">暂存</span></div></div></section><aside class="card"><div class="card-head"><b>内容计划</b><span>查看全部</span></div><div class="card-body"><div class="plan"><small>本周建议</small><em>可直接开始</em><h3>把“先看看”写成一种被尊重的节奏</h3><p>已有账号身份、顾客原话和门店动作，不需要补资料。</p><div class="plan-actions"><button class="btn secondary sm" data-go="content-discuss">开始制作</button><button class="btn ghost sm">调整</button></div></div><div class="plan"><small>下周候选</small><h3>同一件外套，为什么有人先看口袋</h3><p>需要选择一件真实商品后才可开始。</p><div class="plan-actions"><button class="btn secondary sm">选择商品</button></div></div><div class="admin-note">点「开始制作」才会真正开工。</div></div></aside></div></div></div></main>`;return shell('content','series',body)}
function displayInput(){const body=`<main class="workspace"><div class="main"><div class="inventory-grid"><section class="inventory-card"><div class="inventory-head"><div class="ico">${I('rail')}</div><div><h2>本次可用库存</h2><p>把清单粘进来就行；有特别想主推的，顺手说一句</p></div></div><div class="inventory-body"><textarea>双面短外套 ZX-C218，炭灰/深绿格纹，2 件

function rail(rev){const h=(n)=>Array.from({length:n},(_,i)=>`<span class="hanger ${i===1?'focus':i===5?'response':''}"></span>`).join('');return `<div class="rail-wrap"><div class="rail-head"><b>双层挂杆结构示意</b><div class="legend"><span><i></i>主焦点</span><span><i class="res"></i>回应点</span></div></div><div class="rail-diagram"><div class="direction">${I('arrow')}主来客从左侧进入</div><div class="rail-row"><span class="rail-label">上杆</span><div class="rod"><div class="hangers">${h(rev?7:8)}</div></div></div><div class="zone-grid"><div class="zone"><small>A 组 · 主焦点</small><h4>炭灰双面短外套正挂</h4><p>入口先看到大面积炭灰；下杆补齐浅针织和深灰裤。</p></div><div class="zone"><small>B 组 · 过渡</small><h4>象牙白针织正挂</h4><p>用浅色面积拉开呼吸，侧挂从浅到深连接两侧。</p></div><div class="zone ${rev?'changed':''}"><small>C 组 · 回应 ${rev?'<span class="delta">上杆 -1</span>':''}</small><h4>深绿格纹马甲回应</h4><p>${rev?'移除一件厚外套并重新居中；下杆不变。':'格纹只出现一次，右侧不堆两件厚外套。'}</p></div></div><div class="rail-row"><span class="rail-label">下杆</span><div class="rod"><div class="hangers">${h(7)}</div></div></div></div><div class="caption">这是摆放示意图，不是门店实拍。</div></div>`}
function displayArtifact(rev=false){return `<section class="artifact"><div class="artifact-bar"><div class="artifact-info"><b>南城店 · 墙面双层挂杆方案</b><span>视觉陈列 · 本次库存 20 件 · 上墙 ${rev?14:15} 件</span></div><div class="versions"><button class="version ${!rev?'active':''}" data-go="display-artifact">V1${rev?' · 当前':''}</button>${rev?'<button class="version active">V2</button>':''}</div><div class="artifact-actions">${rev?`<button class="btn primary sm" data-action="current">${I('check')}设为当前版本</button><button class="btn secondary sm" data-go="display-revision">${I('edit')}继续改</button>`:`<button class="btn primary sm" data-go="display-revision">${I('edit')}继续改</button>`}<button class="btn ghost sm" data-action="export">${I('download')}导出</button><div class="more-wrap"><button class="icon-btn" data-action="more">${I('more')}</button><div class="more-menu"><button data-action="copy">复制全文</button><button data-action="versions-info">查看版本</button><button data-action="end-task">结束任务</button></div></div></div></div><div class="artifact-scroll"><article class="display-doc">${rev?`<div class="change"><div class="ico">${I('edit')}</div><div><b>只改了右边那组（C 组）</b><p>右侧上杆减少一件厚外套并重新居中；A、B 组和下杆顺序保持不变。</p></div></div>`:''}<div class="display-hero"><div style="flex:1"><div class="doc-kicker">方案导读</div><h1>${rev?'右侧减一件，保留原有焦点关系':'左侧先聚焦，右侧用格纹回应'}</h1><p>主来客从左侧进入，先由炭灰双面短外套建立主焦点；中部浅色留出呼吸；右侧只保留一次深绿格纹回应。上下杆按三个搭配组一起看，而不是按品类堆放。</p></div><div class="metrics"><div class="metric"><small>本次库存</small><b>20</b></div><div class="metric"><small>实际上墙</small><b>${rev?14:15}</b></div><div class="metric"><small>搭配组</small><b>3</b></div><div class="metric"><small>正挂</small><b>2</b></div></div></div>${rail(rev)}${rev?`<div class="feedback"><div>${I('info')}</div><div><b>门店反馈</b><p>“右侧两件外套太厚，挂不下。”新版只减少 C 组一件，不重写整面墙。</p></div></div>`:''}<div class="display-sections"><section class="display-section"><h3>上墙次序</h3><ol><li>先清空整组双杆，保留左右边界。</li><li>A 组挂炭灰双面短外套主正挂。</li><li>B 组用象牙白针织形成浅色停顿。</li><li>C 组保留一次深绿格纹回应。</li><li>下杆分别补齐三个区的下装关系。</li></ol></section><section class="display-section"><h3>数量与间距</h3><ul><li>A 组 5 件：上杆 2、下杆 3。</li><li>B 组 5 件：上杆 2、下杆 3。</li><li>C 组 ${rev?4:5} 件：上杆 ${rev?1:2}、下杆 3。</li><li>正挂两侧各留约一个衣架宽。</li></ul></section><section class="display-section"><h3>替代办法</h3><ul><li>主焦点不足时用同色深灰短外套替代。</li><li>浅针织不足时用米白衬衫保持浅色面积。</li><li>格纹不足时改深绿纯色，不增加新图案。</li></ul></section><section class="display-section"><h3>完成后检查</h3><ul><li>从左侧入口退后 3—4 米看第一焦点。</li><li>中部浅色应形成停顿而非被挤满。</li><li>右侧格纹只出现一次。</li></ul></section></div></article></div></section>`}
function displayPage(rev=false){return shell('display','history',`<main class="workspace">${conversation('display',true)}${displayArtifact(rev)}<div class="pane-switch"><button data-mview="chat">对话</button><button data-mview="doc" class="active">方案</button></div></main>`)}
function admin(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="page-head"><div><div class="eyebrow">企业管理</div><h1 class="page-title">入驻与就绪</h1><p class="page-sub">只列出真正需要你处理的事。</p></div></div><div class="admin-grid"><section><div class="actions"><div class="action primary-row"><div class="index">01</div><div><b>确认品牌表达草案</b><p>系统已根据现有资料预填；确认后南城店账号可稳定使用同一品牌方向。</p></div><button class="btn primary sm" data-action="baseline">去确认</button></div><div class="action"><div class="index">02</div><div><b>南城店发布账号与表达身份</b><p>已绑定“南城店账号 + 表达身份：店长 / 门店经营者”。</p></div><div class="done">${I('check')}</div></div><div class="action"><div class="index">03</div><div><b>南城店双层挂杆条件</b><p>结构、容量、视线带和来客方向已经记录。</p></div><div class="done">${I('check')}</div></div><div class="action"><div class="index">04</div><div><b>指定组织素材维护人</b><p>管理员身份不自动取得维护权。</p></div><button class="btn secondary sm" data-go="materials">设置</button></div></div><div class="admin-note">缺哪项只影响对应功能，其他功能照常使用。</div></section><aside class="today"><small>今天只需完成一件事</small><h2>把“像不像我们”确认下来</h2><p>不用从空白处写品牌哲学。系统已经准备具体正反例，你只需选择、改几句话并确认。</p><button class="btn primary" data-action="baseline">打开草案</button></aside></div></div></div></main>`;return shell('admin','readiness',body)}
function materials(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="page-head"><div><div class="eyebrow">素材边界</div><h1 class="page-title">私人素材与组织素材分开</h1><p class="page-sub">私人原件只属于本人当前授权期；组织素材由明确维护人从本组织入口录入。</p></div><div class="page-head-actions"><button class="btn secondary" data-action="prefs">私人协作偏好</button><button class="btn primary" data-action="material">新建素材</button></div></div><div class="materials"><section class="material-zone" data-note="总部、区域、门店每个有效自然人都可拥有本人独占的私人素材。"><div class="material-head"><div class="material-head-top"><div class="ico">${I('lock')}</div><h2>我的私人素材</h2><span class="scope private">仅本人</span></div><p>只有你主动保存的内容才允许在后续任务复用；不会自动转成组织素材。</p></div><div class="material-body"><div class="material"><div class="mat-thumb">${I('file')}</div><div class="material-copy"><b>门口那份早餐 · 文字观察</b><p>本人保存 · 7 月 21 日</p></div><span class="scope private">仅本人</span></div><div class="material"><div class="mat-thumb" style="background:linear-gradient(135deg,#343331,#777169)">${I('image')}</div><div class="material-copy"><b>南城店早间空镜参考</b><p>图片参考 · 未进入品牌知识</p></div><span class="scope private">仅本人</span></div><button class="btn secondary" style="width:100%;margin-top:10px">添加私人素材</button></div></section><section class="material-zone org"><div class="material-head"><div class="material-head-top"><div class="ico">${I('building')}</div><h2>南城店组织素材</h2><span class="scope">本组织</span></div><p>由授权维护人录入；“组织官方”不自动成为品牌事实或训练数据。</p></div><div class="material-body"><div class="material"><div class="mat-thumb">${I('image')}</div><div class="material-copy"><b>南城店门头与入口空镜</b><p>控制组织：南城店 · V2</p></div><span class="scope">本店</span></div><div class="material"><div class="mat-thumb" style="background:linear-gradient(135deg,#6b7265,#28312b)">${I('box')}</div><div class="material-copy"><b>ZX-C218 商品展示参考</b><p>适用品牌：折线之间</p></div><span class="scope down">授权的区域和门店可用</span></div><button class="btn primary" style="width:100%;margin-top:10px">录入组织素材</button></div></section></div><section class="boundary"><h3>第一版边界</h3><div class="boundary-grid"><div class="boundary-cell"><small>私人 → 组织</small><b>不转换、不投稿</b></div><div class="boundary-cell"><small>管理员查看私人原件</small><b>不允许</b></div><div class="boundary-cell"><small>组织素材自动变知识</small><b>不允许</b></div><div class="boundary-cell"><small>不同公司之间</small><b>不共用，也不拿去训练</b></div></div><div class="warning">第一版不能处理认得出真人未成年人的照片、视频或声音。请改用不带人物的画面或文字描述。</div></section></div></div></main>`;return shell('admin','org',body)}
function system(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="eyebrow">系统状态</div><h1 class="page-title">只给结论与下一动作</h1><p class="page-sub">出问题时，只告诉你结论和下一步。</p><div class="system-grid"><section class="system-card" data-note="不显示虚假百分比；输入和任务上下文已经保留。"><div class="system-title"><div class="ico">${I('clock')}</div><h3>生成中</h3></div><div class="alert info">${I('info')}正在整理成品……可以取消或继续等待。</div></section><section class="system-card" data-note="只有缺口会改变可执行结果时才追问一次。"><div class="system-title"><div class="ico">${I('warn')}</div><h3>缺一个必要输入</h3></div><div class="alert warn">${I('warn')}要给出准确数量与间距，我还需要知道这组双杆大约能挂多少件。</div></section><section class="system-card" data-note="客户端隐藏菜单不是安全边界；服务端仍会拒绝越权。"><div class="system-title"><div class="ico">${I('lock')}</div><h3>权限不足</h3></div><div class="alert error">${I('lock')}你目前没有维护组织素材的权限。可以继续使用已授权素材。</div></section><section class="system-card" data-note="只用于短暂加载已存在内容，不伪装生成进度。"><div class="system-title"><div class="ico">${I('file')}</div><h3>骨架屏</h3></div><div class="skeleton" style="width:72%"></div><div class="skeleton" style="width:96%"></div><div class="skeleton" style="width:84%"></div><div class="skeleton" style="width:58%"></div></section></div></div></div></main>`;setTimeout(()=>openSearch('三天只带一件'),80);return shell('content','home',body)}
function emptyPattern(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="eyebrow">复用模式 E1</div><h1 class="page-title">空状态</h1><p class="page-sub">同一套模式覆盖搜索无结果、列表零数据和冷启动引导。</p><div class="system-grid"><section class="system-card"><div class="system-title"><div class="ico">${I('search')}</div><h3>搜索无结果</h3></div><div class="alert info">${I('info')}没有找到匹配的成品或方案。换个说法，或去成品列表看看。</div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn secondary sm" data-go="home">去成品列表</button></div></section><section class="system-card"><div class="system-title"><div class="ico">${I('file')}</div><h3>列表零数据</h3></div><p>第一份成品做好后会出现在这里。</p><div style="display:flex;gap:6px;margin-top:10px"><button class="btn primary sm" data-go="content-empty">${I('plus')}新建内容</button></div></section><section class="system-card"><div class="system-title"><div class="ico">${I('palette')}</div><h3>冷启动引导</h3></div><p>先确认品牌草案，今天的建议就能开始了。</p><div style="display:flex;gap:6px;margin-top:10px"><button class="btn secondary sm" data-go="admin">去确认</button></div></section></div></div></div></main>`;return shell('content','home',body)}
function failPattern(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="eyebrow">复用模式 E2</div><h1 class="page-title">可恢复失败</h1><p class="page-sub">输入始终保留，重试有落点；覆盖生成失败、断网和清单没读出来。</p><div class="system-grid"><section class="system-card"><div class="system-title"><div class="ico">${I('warn')}</div><h3>生成失败</h3></div><div class="alert error">${I('warn')}这次成品没有完成。你的输入都还在。</div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn primary sm" data-action="retry">重试</button><button class="btn ghost sm" data-go="content-discuss">回到对话</button></div></section><section class="system-card"><div class="system-title"><div class="ico">${I('warn')}</div><h3>断网</h3></div><div class="alert warn">${I('warn')}网络断了。已写的内容都在，联网后接着来。</div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn secondary sm" data-action="retry">重试</button></div></section><section class="system-card"><div class="system-title"><div class="ico">${I('rail')}</div><h3>清单没读出来</h3></div><div class="alert warn">${I('warn')}这份清单没读出来。检查一下格式，或一行一件再试。</div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn secondary sm" data-action="retry">重新识别</button><button class="btn ghost sm" data-go="display-input">回到清单</button></div></section></div></div></div></main>`;return shell('content','home',body)}
function confirmPattern(){const body=`<main class="workspace"><div class="main"><div class="page"><div class="eyebrow">复用模式 E3</div><h1 class="page-title">高风险确认</h1><p class="page-sub">只用于删除私人素材等找不回来的动作；其余操作不打断。</p><div class="modal-demo"><div class="modal"><h3>删除这份私人素材？</h3><p>「门口那份早餐 · 文字观察」删除后找不回来。</p><div class="modal-actions"><button class="btn secondary sm" data-action="keep">先留着</button><button class="btn accent sm" data-action="del">删除</button></div></div></div></div></div></main>`;return shell('content','home',body)}
function render(id){switch(id){case'landing':return landing();case'home':return home();case'content-empty':return contentEmpty();case'content-discuss':return contentDiscuss();case'content-artifact':return contentArtifact(false);case'content-revision':return contentArtifact(true);case'series':return series();case'display-input':return displayInput();case'display-artifact':return displayPage(false);case'display-revision':return displayPage(true);case'admin':return admin();case'materials':return materials();case'system':return system();case'empty-pattern':return emptyPattern();case'fail-pattern':return failPattern();case'confirm-pattern':return confirmPattern()}}
function setState(id){closeSearch();menu=false;current=id;q('#mount').innerHTML=render(id);bind();qa('[data-state]').forEach(b=>b.classList.toggle('active',b.dataset.state===id));q(`[data-state="${id}"]`)?.scrollIntoView({inline:'center',block:'nearest'});update()}
function bind(){qa('[data-go]').forEach(e=>e.onclick=()=>setState(e.dataset.go));qa('[data-action]').forEach(e=>e.onclick=ev=>{ev.stopPropagation();act(e.dataset.action,e)});qa('[data-mview]').forEach(e=>e.onclick=()=>{const w=e.closest('.workspace');w.classList.toggle('chatview',e.dataset.mview==='chat');qa('[data-mview]',w).forEach(b=>b.classList.toggle('active',b===e))});}
function act(a,el){if(a==='menu'){menu=!menu;q('.app-menu')?.classList.toggle('open',menu);return}if(a==='search'){openSearch();return}if(a==='more'){el?.parentElement.querySelector('.more-menu')?.classList.toggle('open');return}if(a==='send'){if(current==='content-discuss')setState('content-artifact');else toast('已发送；这是交互模型，不会写入真实任务');return}if(a==='identity'){toast('发布账号：折线之间 · 南城店账号 ｜ 表达身份：店长 / 门店经营者');return}const m={help:'提示：顶部切换状态；按 M 切移动端；⌘/Ctrl K 搜索。',attach:'附件只服务本次任务；主动保存后才可复用。',current:'已设为当前版本。',export:'已导出这一版，不会自动设为当前版。',copy:'已复制全文。','versions-info':'所有版本自动保留，在版本条切换查看。','save-material':'已存为你的素材。','end-task':'任务已结束；成品保留在「我的成品」。',retry:'已重新开始；这是交互模型，不会真的生成。',suggest:'已换一个建议。',baseline:'已打开品牌表达草案。',prefs:'已打开私人协作偏好。',material:'请选择私人素材或组织素材入口。',shorter:'已记录：只缩短所选结尾。',spoken:'已记录：所选结尾更口语，其他不动。',del:'已删除；这是交互模型，不会删除真实内容。',keep:'已保留。'};toast(m[a]||'交互已记录');if(el&&el.closest('.more-menu'))el.closest('.more-menu').classList.remove('open')}
function searchMarkup(v=''){return `<div class="search-dialog"><div class="search-row">${I('search')}<input id="searchInput" value="${v}" placeholder="搜索你的成品、任务、方案"><span class="kbd">Esc</span></div><div class="results"><div class="group-label">当前版本成品</div><div class="result active" data-go="content-revision"><div class="ico">${I('file')}</div><div><b>三天只带一件，我先把轻的放回去</b><p>南城店账号 · 小红书视频 · V2 当前版</p></div><span>成品</span></div><div class="result" data-go="display-revision"><div class="ico">${I('rail')}</div><div><b>南城店 · 墙面双层挂杆方案</b><p>陈列搭配 · V2 · 只改了右边那组</p></div><span>方案</span></div><div class="group-label">系列与计划</div><div class="result" data-go="series"><div class="ico">${I('series')}</div><div><b>门店里那些没说完的话</b><p>主题系列 · 下一集待开始</p></div><span>系列</span></div><div class="group-label">本人私人素材</div><div class="result" data-go="materials"><div class="ico">${I('lock')}</div><div><b>门口那份早餐 · 文字观察</b><p>仅本人 · 7 月 21 日保存</p></div><span>私人素材</span></div></div><div class="search-foot"><span>搜索范围：南城店 · 你自己的素材</span><span>↑↓ 选择 · Enter 打开</span></div></div>`}
function openSearch(v=''){const o=q('#searchOverlay');o.innerHTML=searchMarkup(v);o.classList.add('open');o.onclick=e=>{if(e.target===o)closeSearch()};qa('[data-go]',o).forEach(e=>e.onclick=()=>setState(e.dataset.go));setTimeout(()=>q('#searchInput')?.focus(),20)}function closeSearch(){q('#searchOverlay')?.classList.remove('open')}
function toast(t){const e=q('#toast');e.textContent=t;e.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>e.classList.remove('show'),2400)}
function update(){q('#frame').classList.toggle('mobile',mobile);q('#desktop').classList.toggle('active',!mobile);q('#mobile').classList.toggle('active',mobile);document.body.classList.toggle('notes',notes);q('#notes').style.background=notes?'var(--ink)':'#fff';q('#notes').style.color=notes?'#fff':'var(--ink)'}
qa('[data-state]').forEach(e=>e.onclick=()=>setState(e.dataset.state));q('#desktop').onclick=()=>{mobile=false;update()};q('#mobile').onclick=()=>{mobile=true;update()};q('#notes').onclick=()=>{notes=!notes;update();toast(notes?'已显示设计标注':'已隐藏设计标注')};q('#searchTop').onclick=()=>openSearch();document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openSearch()}if(e.key==='Escape')closeSearch();if(e.target.matches('input,textarea'))return;if(e.key.toLowerCase()==='m'){mobile=!mobile;update()}const i=states.findIndex(s=>s[0]===current);if(e.key==='ArrowRight')setState(states[(i+1)%states.length][0]);if(e.key==='ArrowLeft')setState(states[(i-1+states.length)%states.length][0])});document.addEventListener('click',e=>{if(menu&&!e.target.closest('.app-switch')&&!e.target.closest('.app-menu')){menu=false;q('.app-menu')?.classList.remove('open')}if(!e.target.closest('.more-wrap'))qa('.more-menu.open').forEach(x=>x.classList.remove('open'))});setState('landing');
})();
</script>
